components:

  headers:
    X-Total-Count:
      schema:
        type: integer
      description: Total amount of elements for this query
    X-Page-Number:
      schema:
        type: integer
      description: Page number starting from 0
    X-Page-Size:
      schema:
        type: integer
      description: Page size

  parameters:
    userId:
      name: userId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    projectId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    columnId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    cardId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    Page:
      name: page
      description: Page number
      schema:
        format: int32
        default: 0
        type: integer
      in: query
      required: false
    Size:
      name: size
      description: Page size
      schema:
        format: int32
        default: 10
        type: integer
      in: query
      required: false
    Sort:
      name: sort
      description: 'The field to be sorted, direction (e.g.: id,desc)'
      schema:
        default: 'title,asc'
        type: string
      in: query
      required: false

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        surname:
          type: string
        email:
          type: string
        username:
          type: string

    RegisterRequest:
      type: object
      required:
        - username
        - password
        - email
        - name
        - surname
      properties:
        username:
          type: string
        password:
          type: string
        email:
          type: string
        name:
          type: string
        surname:
          type: string

    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
